name: PyPI release

on:
  release:
    types: [released]

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/esp-idf-sbom
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip build

    - name: Check if version needs publishing
      id: check_version
      run: |
        PUBLISHED_VERSION=$(curl https://pypi.org/pypi/esp-idf-sbom/json 2>/dev/null | jq -r '.info.version')
        CURRENT_VERSION=$(python -c "import esp_idf_sbom; print(esp_idf_sbom.__version__)")
        echo "published_version=${PUBLISHED_VERSION}" >> $GITHUB_OUTPUT
        echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT
        if [ "$PUBLISHED_VERSION" == "$CURRENT_VERSION" ]; then
          echo "should_publish=false" >> $GITHUB_OUTPUT
          echo "Version ${PUBLISHED_VERSION} already published, skipping..."
        else
          echo "should_publish=true" >> $GITHUB_OUTPUT
          echo "Packaging and publishing new esp-idf-sbom version: ${CURRENT_VERSION}"
        fi

    - name: Build package
      if: steps.check_version.outputs.should_publish == 'true'
      run: python -m build

    - name: Publish package distributions to PyPI
      if: steps.check_version.outputs.should_publish == 'true'
      uses: pypa/gh-action-pypi-publish@release/v1
